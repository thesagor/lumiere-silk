<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumière Silk — Elegant Silk Scarves & Gift Sets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    :root {
      --ls-gold: #c9a96e;
      --ls-gold-light: #dfc49a;
      --ls-warm-black: #2a2218;
      --ls-ivory: #faf8f5;
      --ls-cream: #f5f0e8;
      --ls-blush: #f0e8e4;
      --ls-sage: #c4d4c0;
      --ls-border: #e8e2d9;
      --ls-muted: #8a7d6f;
      --ls-serif: 'Cormorant Garamond', Georgia, serif;
      --ls-sans: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ls-sans); background: var(--ls-ivory); color: var(--ls-warm-black); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--ls-cream); }
    ::-webkit-scrollbar-thumb { background: var(--ls-gold-light); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroHeight": 95,
      "showTrustBar": true,
      "productColumns": 3,
      "darkSection": "#2a2218",
      "accentColor": "#c9a96e"
    }/*EDITMODE-END*/;

    /* ── Shared styles ─────────────────────────────────────── */
    const eyebrow = { display:'block', fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.3em', textTransform:'uppercase', color:'var(--ls-gold)', marginBottom:14 };
    const serifXL = { fontFamily:'var(--ls-serif)', fontWeight:400, lineHeight:1.08, color:'var(--ls-warm-black)', fontSize:'clamp(32px,5vw,58px)', margin:'0 0 20px' };
    const serifLG = { fontFamily:'var(--ls-serif)', fontWeight:400, lineHeight:1.1, color:'var(--ls-warm-black)', fontSize:'clamp(26px,4vw,44px)', margin:'0 0 16px' };
    const bodyText = { fontFamily:'var(--ls-sans)', fontSize:14, lineHeight:1.85, color:'var(--ls-muted)' };
    const container = { maxWidth:1280, margin:'0 auto', padding:'0 32px' };
    const section = { padding:'96px 0' };
    const tagline = { fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(201,169,110,0.8)', margin:'10px 0 0' };

    function BtnPrimary({ children, href='#', style={} }) {
      const [hov, setHov] = useState(false);
      return (
        <a href={href}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', padding:'14px 32px', border:'1px solid var(--ls-warm-black)', background: hov ? 'transparent' : 'var(--ls-warm-black)', color: hov ? 'var(--ls-warm-black)' : 'var(--ls-ivory)', transition:'all 0.3s', cursor:'pointer', ...style }}>
          {children}
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      );
    }

    function BtnOutline({ children, href='#', light=false, style={} }) {
      const [hov, setHov] = useState(false);
      const base = light
        ? { border:'1px solid rgba(250,248,245,0.4)', color: hov ? 'var(--ls-warm-black)' : 'var(--ls-ivory)', background: hov ? 'var(--ls-ivory)' : 'transparent' }
        : { border:'1px solid var(--ls-warm-black)', color: hov ? 'var(--ls-ivory)' : 'var(--ls-warm-black)', background: hov ? 'var(--ls-warm-black)' : 'transparent' };
      return (
        <a href={href} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', padding:'14px 32px', transition:'all 0.3s', cursor:'pointer', ...base, ...style }}>
          {children}
        </a>
      );
    }

    /* ── Announcement Bar ──────────────────────────────────── */
    function AnnouncementBar() {
      return (
        <div style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', textAlign:'center', padding:'11px 0' }}>
          Free shipping on orders over $75 · Canada-wide delivery
        </div>
      );
    }

    /* ── Header / Nav ──────────────────────────────────────── */
    function Header() {
      const [scrolled, setScrolled] = useState(false);
      const [cartCount] = useState(0);
      const [menuOpen, setMenuOpen] = useState(false);
      const [shopOpen, setShopOpen] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const navLink = (hov) => ({ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase', color: hov ? 'var(--ls-warm-black)' : 'var(--ls-muted)', transition:'color 0.2s', padding:'0 16px', cursor:'pointer' });

      return (
        <header style={{ position:'fixed', top:36, left:0, right:0, zIndex:1000, background: scrolled ? 'rgba(250,248,245,0.96)' : 'rgba(250,248,245,0.85)', backdropFilter:'blur(12px)', borderBottom:`1px solid ${scrolled ? 'var(--ls-border)' : 'transparent'}`, transition:'all 0.35s', padding:'18px 0' }}>
          <div style={{ ...container, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            {/* Logo */}
            <a href="#" style={{ fontFamily:'var(--ls-serif)', fontSize:22, letterSpacing:'0.08em', color:'var(--ls-warm-black)', fontWeight:400, flexShrink:0 }}>
              Lumière Silk
            </a>

            {/* Nav */}
            <nav style={{ display:'flex', alignItems:'center', gap:0 }}>
              {['Home','About','Contact','FAQ'].map(item => {
                const [hov, setHov] = useState(false);
                const hrefs = { Home:'Lumiere Silk Homepage.html', About:'Lumiere Silk About.html', Contact:'Lumiere Silk Contact.html', FAQ:'Lumiere Silk FAQ.html' };
                return (
                  <a key={item} href={hrefs[item]} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} style={navLink(hov)}>{item}</a>
                );
              })}
              {/* Shop dropdown */}
              <div style={{ position:'relative' }} onMouseEnter={() => setShopOpen(true)} onMouseLeave={() => setShopOpen(false)}>
                <span style={{ ...navLink(shopOpen), display:'flex', alignItems:'center', gap:4 }}>
                  Shop
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                </span>
                {shopOpen && (
                  <div style={{ position:'absolute', top:'100%', left:'50%', transform:'translateX(-50%)', background:'var(--ls-ivory)', border:'1px solid var(--ls-border)', padding:'8px 0', minWidth:160, boxShadow:'0 8px 32px rgba(42,34,24,0.1)', marginTop:8 }}>
                    {[['All Products','#'],['Silk Scarves','#'],['Gift Sets','#']].map(([label, href]) => {
                      const [h, setH] = useState(false);
                      return (
                        <a key={label} href={href} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
                          style={{ display:'block', padding:'10px 20px', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.15em', textTransform:'uppercase', color: h ? 'var(--ls-warm-black)' : 'var(--ls-muted)', background: h ? 'var(--ls-cream)' : 'transparent', transition:'all 0.2s' }}>
                          {label}
                        </a>
                      );
                    })}
                  </div>
                )}
              </div>
            </nav>

            {/* Icons */}
            <div style={{ display:'flex', alignItems:'center', gap:20 }}>
              {/* Search */}
              <IconBtn title="Search">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </IconBtn>
              {/* Wishlist */}
              <IconBtn title="Wishlist">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </IconBtn>
              {/* Cart */}
              <div style={{ position:'relative' }}>
                <IconBtn title="Cart">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                </IconBtn>
                {cartCount > 0 && (
                  <span style={{ position:'absolute', top:-6, right:-6, background:'var(--ls-gold)', color:'var(--ls-warm-black)', width:16, height:16, borderRadius:'50%', fontSize:9, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--ls-sans)', fontWeight:600 }}>{cartCount}</span>
                )}
              </div>
            </div>
          </div>
        </header>
      );
    }

    function IconBtn({ children, title }) {
      const [hov, setHov] = useState(false);
      return (
        <button title={title} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ background:'none', border:'none', cursor:'pointer', color: hov ? 'var(--ls-gold)' : 'var(--ls-warm-black)', transition:'color 0.2s', display:'flex', padding:4 }}>
          {children}
        </button>
      );
    }

    /* ── Hero Section ──────────────────────────────────────── */
    function HeroSection({ tweaks }) {
      return (
        <section style={{ position:'relative', height:`${tweaks.heroHeight}vh`, overflow:'hidden', display:'flex', alignItems:'flex-end' }}>
          {/* Background image */}
          <img src="uploads/hero-new.jpg" alt="Lumière Silk" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center top' }} />
          {/* Gradient overlay left */}
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(42,34,24,0.55) 0%, rgba(42,34,24,0.25) 55%, rgba(42,34,24,0.0) 100%)' }}></div>
          {/* Decorative gold line */}
          <div style={{ position:'absolute', top:'50%', right:80, transform:'translateY(-50%)', width:1, height:'40%', background:'rgba(201,169,110,0.3)' }}></div>
          <div style={{ position:'absolute', top:'50%', right:120, transform:'translateY(-50%)', width:1, height:'25%', background:'rgba(201,169,110,0.15)' }}></div>

          {/* Content */}
          <div style={{ ...container, position:'relative', zIndex:2, width:'100%', paddingBottom:88 }}>
            <div style={{ maxWidth:580, animation:'fadeInUp 0.9s ease-out both' }}>
              <span style={{ ...eyebrow, color:'rgba(250,248,245,0.65)', marginBottom:20 }}>Lumière Silk</span>
              <h1 style={{ fontFamily:'var(--ls-serif)', fontWeight:400, fontSize:'clamp(40px,6.5vw,80px)', lineHeight:1.04, color:'var(--ls-ivory)', margin:'0 0 24px', letterSpacing:'0.01em' }}>
                Silk Scarves<br />
                <em style={{ fontStyle:'italic' }}>Designed for Gifting</em>
              </h1>
              <p style={{ ...bodyText, color:'rgba(250,248,245,0.72)', fontSize:15, marginBottom:44, maxWidth:440, lineHeight:1.85 }}>
                Elegant, ready-to-gift pieces designed to make every moment feel special.
              </p>
              <div style={{ display:'flex', gap:16, flexWrap:'wrap' }}>
                <BtnOutline light href="#">Shop Gift Sets</BtnOutline>
                <BtnOutline light href="#" style={{ borderColor:'rgba(250,248,245,0.2)', color:'rgba(250,248,245,0.65)' }}>Shop Scarves</BtnOutline>
              </div>
            </div>
          </div>
          {/* Scroll hint */}
          <div style={{ position:'absolute', bottom:32, left:'50%', transform:'translateX(-50%)', display:'flex', flexDirection:'column', alignItems:'center', gap:8, opacity:0.45, animation:'bob 2s ease-in-out infinite' }}>
            <span style={{ fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.25em', textTransform:'uppercase', color:'var(--ls-ivory)' }}>Scroll</span>
            <svg width="12" height="20" viewBox="0 0 12 20" fill="none"><rect x="4.5" y="4" width="3" height="6" rx="1.5" fill="rgba(250,248,245,0.6)"/><rect x="0.5" y="0.5" width="11" height="19" rx="5.5" stroke="rgba(250,248,245,0.4)"/></svg>
          </div>
        </section>
      );
    }

    /* ── Trust Bar ─────────────────────────────────────────── */
    function TrustBar({ visible }) {
      if (!visible) return null;
      const items = [
        { icon: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>, label:'Free Shipping in Canada' },
        { icon: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>, label:'Gift-Ready Packaging' },
        { icon: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>, label:'Curated Selection' },
        { icon: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>, label:'Thoughtful Gifting' },
      ];
      return (
        <div style={{ background:'var(--ls-ivory)', borderBottom:'1px solid var(--ls-border)', padding:'18px 0' }}>
          <div style={{ ...container, display:'flex', justifyContent:'center', gap:56, flexWrap:'wrap' }}>
            {items.map(({ icon, label }) => (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:10, color:'var(--ls-muted)' }}>
                <span style={{ color:'var(--ls-gold)' }}>{icon}</span>
                <span style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase' }}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── Brand Intro ───────────────────────────────────────── */
    function BrandIntroSection() {
      return (
        <section style={{ ...section, background:'var(--ls-ivory)' }}>
          <div style={{ ...container }}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:72, alignItems:'center' }}>
              <div>
                <span style={eyebrow}>Why Customers Love Lumière Silk</span>
                <h2 style={serifXL}>More than a scarf —<br /><em style={{ fontStyle:'italic' }}>a refined gifting experience.</em></h2>
                <p style={{ ...bodyText, marginBottom:28, maxWidth:460 }}>
                  Each Lumière Silk piece is created to feel intentional and refined — ready to give, beautifully presented, and made for the moments that matter.
                </p>
                <div style={{ display:'flex', flexDirection:'column', gap:14, marginBottom:36 }}>
                  {['Ready-to-gift packaging — no extra wrapping needed','Elegant presentation that feels premium','A thoughtful gift for any occasion','Free shipping across Canada'].map(item => (
                    <div key={item} style={{ display:'flex', alignItems:'center', gap:12 }}>
                      <div style={{ width:5, height:5, background:'var(--ls-gold)', flexShrink:0 }}></div>
                      <span style={{ ...bodyText, fontSize:13 }}>{item}</span>
                    </div>
                  ))}
                </div>
                <BtnOutline href="#">Discover Our Story</BtnOutline>
              </div>
              <div style={{ position:'relative' }}>
                <div style={{ aspectRatio:'3/4', overflow:'hidden', position:'relative' }}>
                  <img src="uploads/brand-intro.jpg" alt="Lumière Silk brand" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                </div>
                {/* Gold accent border */}
                <div style={{ position:'absolute', top:16, right:-16, bottom:-16, left:16, border:'1px solid var(--ls-gold-light)', zIndex:-1, opacity:0.5 }}></div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Product Card ──────────────────────────────────────── */
    const products = [
      { name:'Signature Silk Scarf', price:'$89 CAD', desc:'Timeless, feminine, everyday elegance', tag:'Bestseller', tagColor:'var(--ls-sage)', img:'uploads/products/sig-scarf-1.png', pos:'center top' },
      { name:'Elegant Silk Scarf', price:'$89 CAD', desc:'Understated luxury, graceful styling', tag:'New', tagColor:'var(--ls-sage)', img:'uploads/products/elegant-scarf-3.png', pos:'left center' },
      { name:'Silk Scarf Gift Box', price:'$119 CAD', desc:'Scarf + branded gift box, gift-ready', tag:'Gift Set', tagColor:'var(--ls-gold-light)', img:'uploads/products/small-scarf-1.png', pos:'center center' },
      { name:'Silk Scarf & Brooch Set', price:'$129 CAD', desc:'Scarf + decorative brooch, curated pairing', tag:'Curated', tagColor:'var(--ls-blush)', img:'uploads/products/small-scarf-styled-1.png', pos:'center top' },
      { name:'Silk Scarf & Pearl Earrings', price:'$139 CAD', desc:'Scarf + delicate pearl earrings', tag:'Popular', tagColor:'var(--ls-sage)', img:'uploads/products/brooch-set-3.png', pos:'center top' },
    ];

    function ProductCard({ product, cols }) {
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ cursor:'pointer' }}>
          <div style={{ aspectRatio:'3/4', overflow:'hidden', position:'relative', marginBottom:16 }}>
            {/* Product image */}
            <img src={product.img} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition: product.pos || 'center', display:'block', transform: hov ? 'scale(1.05)' : 'scale(1)', transition:'transform 0.7s ease' }} />
            {/* Tag */}
            <div style={{ position:'absolute', top:14, left:14 }}>
              <span style={{ fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.15em', textTransform:'uppercase', background: product.tagColor, color:'var(--ls-warm-black)', padding:'4px 10px' }}>{product.tag}</span>
            </div>
            {/* Hover overlay */}
            <div style={{ position:'absolute', inset:0, background:'rgba(42,34,24,0.06)', opacity: hov ? 1 : 0, transition:'opacity 0.4s', display:'flex', alignItems:'flex-end', justifyContent:'center', padding:20 }}>
              <button style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.16em', textTransform:'uppercase', background:'var(--ls-ivory)', color:'var(--ls-warm-black)', border:'none', padding:'11px 24px', cursor:'pointer', width:'100%' }}>Add to Cart</button>
            </div>
            {/* Scale image on hover */}
            
          </div>
          <div>
            <p style={{ fontFamily:'var(--ls-serif)', fontSize:16, color:'var(--ls-warm-black)', marginBottom:4 }}>{product.name}</p>
            <p style={{ ...bodyText, fontSize:12, marginBottom:4 }}>{product.desc}</p>
            <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:'var(--ls-muted)', letterSpacing:'0.03em' }}>{product.price}</p>
          </div>
        </div>
      );
    }

    /* ── Signature Collection ──────────────────────────────── */
    function SignatureCollectionSection({ cols }) {
      const displayProducts = products.slice(0, cols === 2 ? 4 : 3);
      return (
        <section style={{ ...section, background:'var(--ls-cream)' }}>
          <div style={container}>
            <div style={{ textAlign:'center', maxWidth:640, margin:'0 auto 56px' }}>
              <span style={eyebrow}>The Collection</span>
              <h2 style={serifXL}>Signature Silk Scarves</h2>
              <p style={{ ...bodyText, maxWidth:520, margin:'0 auto 12px' }}>
                Timeless designs created to feel soft, elegant, and effortless — perfect for both everyday wear and meaningful gifting.
              </p>
              <p style={tagline}>Thoughtful gifts, elegantly packaged.</p>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:`repeat(${cols}, 1fr)`, gap:28, marginBottom:52 }}>
              {displayProducts.map(p => <ProductCard key={p.name} product={p} cols={cols} />)}
            </div>
            <div style={{ textAlign:'center' }}>
              <BtnPrimary href="#">View Collection</BtnPrimary>
            </div>
          </div>
        </section>
      );
    }

    /* ── Gift Sets ─────────────────────────────────────────── */
    function GiftSetsSection() {
      const giftProducts = products.slice(2);
      return (
        <section style={{ ...section, background:'var(--ls-ivory)' }}>
          <div style={container}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:72, alignItems:'center' }}>
              {/* Image side */}
              <div style={{ position:'relative' }}>
                <div style={{ aspectRatio:'4/5', overflow:'hidden', position:'relative' }}>
                  <img src="uploads/gift-sets.jpg" alt="Gift sets" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                </div>
                <div style={{ position:'absolute', top:-16, left:-16, bottom:16, right:16, border:'1px solid var(--ls-gold-light)', zIndex:-1, opacity:0.4 }}></div>
              </div>
              {/* Text side */}
              <div>
                <span style={eyebrow}>Gift Sets</span>
                <h2 style={serifLG}>Designed to<br /><em style={{ fontStyle:'italic' }}>Be Gifted</em></h2>
                <p style={{ ...bodyText, marginBottom:12 }}>Beautifully packaged and ready to give. No extra effort, no extra wrapping — just a gift that feels intentional and refined from the moment it arrives.</p>
                <p style={{ ...bodyText, fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:36, color:'rgba(201,169,110,0.75)' }}>Beautifully chosen. Elegantly presented.</p>
                <div style={{ display:'flex', flexDirection:'column', gap:16, marginBottom:40 }}>
                  {giftProducts.map(p => (
                    <GiftProductRow key={p.name} product={p} />
                  ))}
                </div>
                <BtnPrimary href="#">Shop Gift Sets</BtnPrimary>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function GiftProductRow({ product }) {
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ display:'flex', alignItems:'center', gap:16, padding:'14px 0', borderBottom:'1px solid var(--ls-border)', cursor:'pointer' }}>
          <div style={{ width:52, height:52, flexShrink:0, overflow:'hidden' }}><img src={product.img} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition: product.pos || 'center' }} /></div>
          <div style={{ flex:1 }}>
            <p style={{ fontFamily:'var(--ls-serif)', fontSize:15, color: hov ? 'var(--ls-gold)' : 'var(--ls-warm-black)', transition:'color 0.2s', marginBottom:2 }}>{product.name}</p>
            <p style={{ ...bodyText, fontSize:12 }}>{product.desc}</p>
          </div>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:'var(--ls-muted)', flexShrink:0 }}>{product.price}</p>
        </div>
      );
    }

    /* ── Packaging Section ─────────────────────────────────── */
    function PackagingSection() {
      return (
        <section style={{ ...section, background:'var(--ls-blush)' }}>
          <div style={container}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:72, alignItems:'center' }}>
              <div>
                <span style={eyebrow}>The Experience</span>
                <h2 style={serifLG}>The Art of Gifting</h2>
                <p style={{ ...bodyText, marginBottom:16 }}>Every detail matters — from the softness of the silk to the presentation of the final box. Our packaging is designed to feel refined, graceful, and ready to gift, creating a memorable unboxing experience that reflects the beauty of the brand.</p>
                <p style={{ ...tagline, marginBottom:36 }}>Refined packaging · Thoughtful details · Timeless impression.</p>
                <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                  {['Elegantly boxed, ribbon-tied', 'Ready to gift — no wrapping needed', 'Presented with a Lumière Silk card'].map(item => (
                    <div key={item} style={{ display:'flex', alignItems:'center', gap:12 }}>
                      <div style={{ width:5, height:5, background:'var(--ls-gold)', flexShrink:0 }}></div>
                      <span style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:'var(--ls-muted)', letterSpacing:'0.04em' }}>{item}</span>
                    </div>
                  ))}
                </div>
              </div>
              {/* Packaging image */}
              <div style={{ aspectRatio:'1/1', overflow:'hidden' }}>
                <img src="uploads/packaging-detail.jpg" alt="Gift packaging" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Brand Story (Dark) ────────────────────────────────── */
    function BrandStorySection({ darkBg }) {
      return (
        <section style={{ padding:'112px 0', background: darkBg, position:'relative', overflow:'hidden' }}>
          {/* Background image with dark overlay */}
          <img src="uploads/brand-story.jpg" alt="" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.18 }} />
          {/* Decorative elements */}
          <div style={{ position:'absolute', top:'50%', left:60, transform:'translateY(-50%)', width:1, height:'50%', background:'rgba(201,169,110,0.15)' }}></div>
          <div style={{ position:'absolute', top:'50%', right:60, transform:'translateY(-50%)', width:1, height:'50%', background:'rgba(201,169,110,0.15)' }}></div>
          <div style={{ ...container, textAlign:'center', maxWidth:760, margin:'0 auto', position:'relative' }}>
            <span style={{ ...eyebrow, color:'rgba(201,169,110,0.6)' }}>Our Philosophy</span>
            <h2 style={{ ...serifXL, color:'var(--ls-ivory)', marginBottom:24 }}>Designed in Canada,<br /><em style={{ fontStyle:'italic' }}>inspired by timeless elegance.</em></h2>
            <div style={{ width:40, height:1, background:'rgba(201,169,110,0.4)', margin:'0 auto 28px' }}></div>
            <p style={{ ...bodyText, color:'rgba(250,248,245,0.6)', maxWidth:580, margin:'0 auto 44px', fontSize:15, lineHeight:1.9 }}>
              Each piece is carefully selected to offer a soft, refined, and thoughtful gifting experience.
            </p>
            <div style={{ display:'flex', gap:16, justifyContent:'center', flexWrap:'wrap' }}>
              <BtnOutline light href="#">Shop Gift Sets</BtnOutline>
              <BtnOutline light href="#" style={{ borderColor:'rgba(250,248,245,0.2)', color:'rgba(250,248,245,0.65)' }}>Explore Scarves</BtnOutline>
            </div>
          </div>
        </section>
      );
    }

    /* ── Newsletter ────────────────────────────────────────── */
    function NewsletterSection() {
      const [email, setEmail] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const [focused, setFocused] = useState(false);

      const handleSubmit = (e) => { e.preventDefault(); if (email) setSubmitted(true); };

      return (
        <section style={{ padding:'80px 0', background:'var(--ls-cream)', borderTop:'1px solid var(--ls-border)' }}>
          <div style={{ ...container, textAlign:'center', maxWidth:520, margin:'0 auto' }}>
            <span style={eyebrow}>Stay Close</span>
            <h2 style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(24px,3vw,36px)', fontWeight:400, color:'var(--ls-warm-black)', marginBottom:12 }}>Join the Lumière Circle</h2>
            <p style={{ ...bodyText, marginBottom:36 }}>Receive updates on new arrivals, exclusive offers, and the quiet beauty of Lumière Silk.</p>
            {submitted ? (
              <div style={{ fontFamily:'var(--ls-sans)', fontSize:12, letterSpacing:'0.1em', color:'var(--ls-gold)', textTransform:'uppercase' }}>Thank you — welcome to Lumière Silk.</div>
            ) : (
              <form onSubmit={handleSubmit} style={{ display:'flex', gap:0, maxWidth:420, margin:'0 auto' }}>
                <input
                  type="email" placeholder="Your email address" value={email}
                  onChange={e => setEmail(e.target.value)}
                  onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
                  style={{ flex:1, fontFamily:'var(--ls-sans)', fontSize:13, border:`1px solid ${focused ? 'var(--ls-warm-black)' : 'var(--ls-border)'}`, borderRight:'none', padding:'13px 18px', background:'var(--ls-ivory)', color:'var(--ls-warm-black)', outline:'none', transition:'border-color 0.2s' }}
                />
                <button type="submit" style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', background:'var(--ls-warm-black)', color:'var(--ls-ivory)', border:'1px solid var(--ls-warm-black)', padding:'13px 22px', cursor:'pointer', whiteSpace:'nowrap' }}>Subscribe</button>
              </form>
            )}
          </div>
        </section>
      );
    }

    /* ── Footer ────────────────────────────────────────────── */
    function Footer() {
      const cols = [
        { title:'Shop', links:['All Products','Silk Scarves','Gift Sets'] },
        { title:'Help', links:['FAQ','Shipping Policy','Return Policy','Privacy Policy'] },
        { title:'Company', links:['About Us','Contact','Services'] },
      ];
      return (
        <footer style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', padding:'72px 0 0' }}>
          <div style={{ ...container }}>
            <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap:48, marginBottom:60 }}>
              {/* Brand col */}
              <div>
                <div style={{ fontFamily:'var(--ls-serif)', fontSize:20, letterSpacing:'0.08em', marginBottom:16 }}>Lumière Silk</div>
                <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, lineHeight:1.8, color:'rgba(250,248,245,0.5)', maxWidth:240, marginBottom:24 }}>Elegant silk scarves and gift-ready pieces, designed with softness, refinement, and timeless beauty in mind.</p>
                <div style={{ display:'flex', gap:14 }}>
                  {['instagram','pinterest','facebook'].map(s => (
                    <SocialIcon key={s} name={s} />
                  ))}
                </div>
              </div>
              {/* Link cols */}
              {cols.map(col => (
                <div key={col.title}>
                  <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--ls-ivory)', marginBottom:20, fontWeight:500 }}>{col.title}</p>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    {col.links.map(link => {
                      const [h, setH] = useState(false);
                      return <a key={link} href="#" onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} style={{ fontFamily:'var(--ls-sans)', fontSize:13, color: h ? 'var(--ls-ivory)' : 'rgba(250,248,245,0.5)', transition:'color 0.2s' }}>{link}</a>;
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ borderTop:'1px solid rgba(250,248,245,0.1)', padding:'20px 32px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>© 2026 Lumière Silk. All rights reserved.</p>
            <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>lumieresilk.ca@gmail.com</p>
          </div>
        </footer>
      );
    }

    function SocialIcon({ name }) {
      const [hov, setHov] = useState(false);
      const icons = {
        instagram: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>,
        pinterest: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.24 2.65 7.86 6.39 9.29-.09-.78-.17-1.98.04-2.83.18-.77 1.23-5.22 1.23-5.22s-.31-.63-.31-1.56c0-1.46.85-2.55 1.9-2.55.9 0 1.33.67 1.33 1.48 0 .9-.58 2.26-.87 3.52-.25 1.05.52 1.9 1.54 1.9 1.85 0 3.1-2.38 3.1-5.2 0-2.15-1.46-3.66-3.54-3.66-2.41 0-3.83 1.81-3.83 3.68 0 .73.28 1.51.63 1.94.07.08.08.16.06.24l-.23.97c-.04.16-.13.19-.29.11-1.08-.5-1.76-2.1-1.76-3.38 0-2.74 1.99-5.25 5.74-5.25 3.01 0 5.35 2.15 5.35 5.01 0 2.99-1.88 5.39-4.49 5.39-.88 0-1.7-.46-1.98-1l-.54 2.01c-.19.75-.72 1.69-1.08 2.26.81.25 1.67.39 2.56.39 5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>,
        facebook: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>,
      };
      return (
        <a href="#" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
          style={{ width:34, height:34, border:'1px solid rgba(250,248,245,0.2)', display:'flex', alignItems:'center', justifyContent:'center', color: hov ? 'var(--ls-gold)' : 'rgba(250,248,245,0.5)', borderColor: hov ? 'rgba(201,169,110,0.4)' : 'rgba(250,248,245,0.15)', transition:'all 0.2s', cursor:'pointer' }}>
          {icons[name]}
        </a>
      );
    }

    /* ── App ───────────────────────────────────────────────── */
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <div>
          <style>{`
            @keyframes fadeInUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
            @keyframes bob { 0%,100% { transform:translateX(-50%) translateY(0); } 50% { transform:translateX(-50%) translateY(6px); } }
          `}</style>

          <AnnouncementBar />
          <div style={{ height:36 }}></div>
          <Header />

          <main>
            <HeroSection tweaks={t} />
            <TrustBar visible={t.showTrustBar} />
            <BrandIntroSection />
            <SignatureCollectionSection cols={t.productColumns} />
            <GiftSetsSection />
            <PackagingSection />
            <BrandStorySection darkBg={t.darkSection} />
            <NewsletterSection />
          </main>

          <Footer />

          <TweaksPanel>
            <TweakSection label="Hero" />
            <TweakSlider label="Hero Height" value={t.heroHeight} min={60} max={100} step={5} unit="vh" onChange={v => setTweak('heroHeight', v)} />
            <TweakSection label="Layout" />
            <TweakToggle label="Show Trust Bar" value={t.showTrustBar} onChange={v => setTweak('showTrustBar', v)} />
            <TweakRadio label="Product Columns" value={t.productColumns} options={[2, 3]} onChange={v => setTweak('productColumns', v)} />
            <TweakSection label="Colors" />
            <TweakColor label="Dark Section BG" value={t.darkSection} onChange={v => setTweak('darkSection', v)} />
            <TweakColor label="Accent / Gold" value={t.accentColor} onChange={v => setTweak('accentColor', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
