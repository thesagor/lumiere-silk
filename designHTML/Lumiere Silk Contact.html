<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Lumière Silk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --ls-gold:#c9a96e; --ls-gold-light:#dfc49a; --ls-warm-black:#2a2218;
      --ls-ivory:#faf8f5; --ls-cream:#f5f0e8; --ls-blush:#f0e8e4;
      --ls-border:#e8e2d9; --ls-muted:#8a7d6f;
      --ls-serif:'Cormorant Garamond',Georgia,serif; --ls-sans:'Inter',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--ls-sans);background:var(--ls-ivory);color:var(--ls-warm-black);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--ls-cream);}
    ::-webkit-scrollbar-thumb{background:var(--ls-gold-light);border-radius:3px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const C = { maxWidth:1280, margin:'0 auto', padding:'0 32px' };
  const eyebrow = { display:'block', fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.3em', textTransform:'uppercase', color:'var(--ls-gold)', marginBottom:14 };
  const body14 = { fontFamily:'var(--ls-sans)', fontSize:14, lineHeight:1.85, color:'var(--ls-muted)' };

  const NAV = [
    ['Home','Lumiere Silk Homepage.html'],
    ['Shop','#'],
    ['About','Lumiere Silk About.html'],
    ['Contact','Lumiere Silk Contact.html'],
    ['FAQ','Lumiere Silk FAQ.html'],
  ];

  function Header() {
    const [scrolled, setScrolled] = useState(false);
    useEffect(()=>{
      const f=()=>setScrolled(window.scrollY>20);
      window.addEventListener('scroll',f); return ()=>window.removeEventListener('scroll',f);
    },[]);
    return (
      <header style={{ position:'fixed', top:36, left:0, right:0, zIndex:1000, background: scrolled?'rgba(250,248,245,0.96)':'rgba(250,248,245,0.88)', backdropFilter:'blur(12px)', borderBottom:`1px solid ${scrolled?'var(--ls-border)':'transparent'}`, transition:'all 0.35s', padding:'18px 0' }}>
        <div style={{ ...C, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <a href="Lumiere Silk Homepage.html" style={{ fontFamily:'var(--ls-serif)', fontSize:22, letterSpacing:'0.08em' }}>Lumière Silk</a>
          <nav style={{ display:'flex', alignItems:'center' }}>
            {NAV.map(([label, href]) => {
              const [h, setH] = useState(false);
              const isActive = label === 'Contact';
              return (
                <a key={label} href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
                  style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase', color: isActive?'var(--ls-warm-black)':h?'var(--ls-warm-black)':'var(--ls-muted)', padding:'0 16px', transition:'color 0.2s', borderBottom: isActive?'1px solid var(--ls-gold)':'none', paddingBottom: isActive?4:0 }}>
                  {label}
                </a>
              );
            })}
          </nav>
          <div style={{ display:'flex', gap:18 }}>
            {[<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            ].map((icon,i)=>{
              const [h,setH]=useState(false);
              return <button key={i} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ background:'none',border:'none',cursor:'pointer',color:h?'var(--ls-gold)':'var(--ls-warm-black)',transition:'color 0.2s',display:'flex',padding:4 }}>{icon}</button>;
            })}
          </div>
        </div>
      </header>
    );
  }

  /* ── Page Hero ─── */
  function PageHero() {
    return (
      <section style={{ background:'var(--ls-cream)', padding:'120px 0 60px', textAlign:'center', borderBottom:'1px solid var(--ls-border)' }}>
        <span style={eyebrow}>Get in Touch</span>
        <h1 style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(36px,5vw,62px)', fontWeight:400, lineHeight:1.08, marginBottom:16 }}>We'd Love to<br /><em style={{ fontStyle:'italic' }}>Hear from You</em></h1>
        <p style={{ ...body14, maxWidth:440, margin:'0 auto' }}>Whether you have a question about your order, a gifting enquiry, or simply want to say hello — we're here to help.</p>
      </section>
    );
  }

  /* ── Contact Form ─── */
  function ContactSection() {
    const [form, setForm] = useState({ name:'', email:'', subject:'', message:'' });
    const [focused, setFocused] = useState('');
    const [submitted, setSubmitted] = useState(false);
    const [errors, setErrors] = useState({});

    const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

    const validate = () => {
      const e = {};
      if (!form.name.trim()) e.name = 'Please enter your name';
      if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Please enter a valid email';
      if (!form.message.trim()) e.message = 'Please enter your message';
      return e;
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      const errs = validate();
      if (Object.keys(errs).length) { setErrors(errs); return; }
      setSubmitted(true);
    };

    const fieldStyle = (key) => ({
      width:'100%', fontFamily:'var(--ls-sans)', fontSize:13, border:`1px solid ${errors[key]?'#c87676':focused===key?'var(--ls-warm-black)':'var(--ls-border)'}`, padding:'13px 16px', background:'#fff', color:'var(--ls-warm-black)', outline:'none', transition:'border-color 0.2s', display:'block',
    });

    const labelStyle = { fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ls-muted)', display:'block', marginBottom:7 };

    return (
      <section style={{ padding:'80px 0', background:'var(--ls-ivory)' }}>
        <div style={C}>
          <div style={{ display:'grid', gridTemplateColumns:'1.2fr 0.8fr', gap:80, alignItems:'start' }}>
            {/* Form */}
            <div>
              {submitted ? (
                <div style={{ textAlign:'center', padding:'60px 0' }}>
                  <div style={{ width:48, height:48, border:'1px solid var(--ls-gold)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 24px' }}>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--ls-gold)" strokeWidth="1.5"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <h3 style={{ fontFamily:'var(--ls-serif)', fontSize:28, fontWeight:400, marginBottom:12 }}>Message Received</h3>
                  <p style={{ ...body14, marginBottom:32 }}>Thank you for reaching out. We'll be in touch within 1–2 business days.</p>
                  <button onClick={()=>{setSubmitted(false);setForm({name:'',email:'',subject:'',message:''});}} style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', background:'none', border:'1px solid var(--ls-border)', padding:'12px 24px', cursor:'pointer', color:'var(--ls-muted)' }}>Send Another</button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:24 }}>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
                    <div>
                      <label style={labelStyle}>Name *</label>
                      <input type="text" value={form.name} onChange={e=>set('name',e.target.value)} onFocus={()=>setFocused('name')} onBlur={()=>{setFocused('');setErrors(er=>({...er,name:undefined}));}} placeholder="Your full name" style={fieldStyle('name')} />
                      {errors.name && <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'#c87676', marginTop:5 }}>{errors.name}</p>}
                    </div>
                    <div>
                      <label style={labelStyle}>Email *</label>
                      <input type="email" value={form.email} onChange={e=>set('email',e.target.value)} onFocus={()=>setFocused('email')} onBlur={()=>{setFocused('');setErrors(er=>({...er,email:undefined}));}} placeholder="your@email.com" style={fieldStyle('email')} />
                      {errors.email && <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'#c87676', marginTop:5 }}>{errors.email}</p>}
                    </div>
                  </div>
                  <div>
                    <label style={labelStyle}>Subject</label>
                    <select value={form.subject} onChange={e=>set('subject',e.target.value)} onFocus={()=>setFocused('subject')} onBlur={()=>setFocused('')}
                      style={{ ...fieldStyle('subject'), appearance:'none', backgroundImage:`url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path fill='rgba(138,125,111,0.8)' d='M0 0l5 6 5-6z'/></svg>")`, backgroundRepeat:'no-repeat', backgroundPosition:'right 14px center' }}>
                      <option value="">Select a topic</option>
                      <option>Order enquiry</option>
                      <option>Gifting & packaging</option>
                      <option>Returns & exchanges</option>
                      <option>Shipping information</option>
                      <option>General question</option>
                    </select>
                  </div>
                  <div>
                    <label style={labelStyle}>Message *</label>
                    <textarea value={form.message} onChange={e=>set('message',e.target.value)} onFocus={()=>setFocused('message')} onBlur={()=>{setFocused('');setErrors(er=>({...er,message:undefined}));}} placeholder="How can we help you?" rows={6} style={{ ...fieldStyle('message'), resize:'vertical', lineHeight:1.7 }} />
                    {errors.message && <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'#c87676', marginTop:5 }}>{errors.message}</p>}
                  </div>
                  <div>
                    <SubmitBtn />
                  </div>
                </form>
              )}
            </div>

            {/* Info panel */}
            <div style={{ display:'flex', flexDirection:'column', gap:40 }}>
              {[
                { icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ls-gold)" strokeWidth="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>, title:'Email Us', lines:['lumieresilk.ca@gmail.com','We respond within 1–2 business days.'] },
                { icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ls-gold)" strokeWidth="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>, title:'Location', lines:['Canada','Primarily serving Canada,','with future U.S. expansion.'] },
                { icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ls-gold)" strokeWidth="1.5"><rect x="1" y="3" width="22" height="18" rx="2"/><path d="M1 9h22"/></svg>, title:'Order Support', lines:['For order enquiries, please have','your order number ready.','We\'re happy to help.'] },
              ].map(({ icon, title, lines }) => (
                <div key={title} style={{ display:'flex', gap:20 }}>
                  <div style={{ width:44, height:44, border:'1px solid var(--ls-border)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{icon}</div>
                  <div>
                    <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ls-warm-black)', fontWeight:500, marginBottom:8 }}>{title}</p>
                    {lines.map((l,i) => <p key={i} style={{ ...body14, fontSize:13 }}>{l}</p>)}
                  </div>
                </div>
              ))}

              {/* Decorative image */}
              <div style={{ marginTop:8, overflow:'hidden' }}>
                <img src="uploads/gift-packaging.jpg" alt="Lumière Silk packaging" style={{ width:'100%', aspectRatio:'4/3', objectFit:'cover', display:'block' }} />
              </div>
            </div>
          </div>
        </div>
      </section>
    );
  }

  function SubmitBtn() {
    const [hov, setHov] = useState(false);
    return (
      <button type="submit" onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', padding:'15px 40px', border:'1px solid var(--ls-warm-black)', background: hov?'transparent':'var(--ls-warm-black)', color: hov?'var(--ls-warm-black)':'var(--ls-ivory)', transition:'all 0.3s', cursor:'pointer' }}>
        Send Message
      </button>
    );
  }

  function Footer() {
    const cols = [
      { title:'Shop', links:['All Products','Silk Scarves','Gift Sets'] },
      { title:'Help', links:['FAQ','Shipping Policy','Return Policy','Privacy Policy'] },
      { title:'Company', links:['About Us','Contact','Services'] },
    ];
    return (
      <footer style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', padding:'72px 0 0' }}>
        <div style={C}>
          <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap:48, marginBottom:60 }}>
            <div>
              <div style={{ fontFamily:'var(--ls-serif)', fontSize:20, letterSpacing:'0.08em', marginBottom:16 }}>Lumière Silk</div>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, lineHeight:1.8, color:'rgba(250,248,245,0.5)', maxWidth:240 }}>Elegant silk scarves and gift-ready pieces, designed with softness, refinement, and timeless beauty.</p>
            </div>
            {cols.map(col => (
              <div key={col.title}>
                <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--ls-ivory)', marginBottom:20, fontWeight:500 }}>{col.title}</p>
                <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                  {col.links.map(link => {
                    const [h,setH]=useState(false);
                    return <a key={link} href="#" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:h?'var(--ls-ivory)':'rgba(250,248,245,0.5)', transition:'color 0.2s' }}>{link}</a>;
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(250,248,245,0.1)', padding:'20px 32px', display:'flex', justifyContent:'space-between' }}>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>© 2026 Lumière Silk. All rights reserved.</p>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>lumieresilk.ca@gmail.com</p>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <div>
        <div style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', textAlign:'center', padding:'11px 0' }}>Free shipping on orders over $75 · Canada-wide delivery</div>
        <div style={{ height:36 }}></div>
        <Header />
        <main style={{ paddingTop:36 }}>
          <PageHero />
          <ContactSection />
        </main>
        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
