<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — Lumière Silk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --ls-gold:#c9a96e; --ls-gold-light:#dfc49a; --ls-warm-black:#2a2218;
      --ls-ivory:#faf8f5; --ls-cream:#f5f0e8; --ls-blush:#f0e8e4;
      --ls-border:#e8e2d9; --ls-muted:#8a7d6f;
      --ls-serif:'Cormorant Garamond',Georgia,serif; --ls-sans:'Inter',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--ls-sans);background:var(--ls-ivory);color:var(--ls-warm-black);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--ls-cream);}
    ::-webkit-scrollbar-thumb{background:var(--ls-gold-light);border-radius:3px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const C = { maxWidth:1280, margin:'0 auto', padding:'0 32px' };
  const eyebrow = { display:'block', fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.3em', textTransform:'uppercase', color:'var(--ls-gold)', marginBottom:14 };
  const body14 = { fontFamily:'var(--ls-sans)', fontSize:14, lineHeight:1.85, color:'var(--ls-muted)' };

  const NAV = [
    ['Home','Lumiere Silk Homepage.html'],
    ['Shop','#'],
    ['About','Lumiere Silk About.html'],
    ['Contact','Lumiere Silk Contact.html'],
    ['FAQ','Lumiere Silk FAQ.html'],
  ];

  const FAQS = [
    { cat:'Products', q:'What products do you offer?', a:'Lumière Silk offers elegant silk scarves, gift-ready sets, and selected accessories designed with softness, refinement, and timeless beauty in mind. Our collection includes the Signature Silk Scarf, Elegant Silk Scarf, Silk Scarf Gift Box, Silk Scarf & Brooch Set, and Silk Scarf & Pearl Earrings Set.' },
    { cat:'Products', q:'Do your products come in gift packaging?', a:'Some products include gift-ready packaging or gift box presentation. Our Silk Scarf Gift Box and curated sets are designed to arrive beautifully packaged, ribbon-tied, and ready to gift — no wrapping needed. Please refer to the individual product description for full packaging details.' },
    { cat:'Shipping', q:'Do you ship within Canada?', a:'Yes, Lumière Silk currently focuses primarily on shipping within Canada. We offer reliable delivery across the country, with tracking information provided once your order has been dispatched.' },
    { cat:'Shipping', q:'Do you ship to the United States?', a:'At this stage, our primary focus is Canada. U.S. shipping may be added in the future as we expand. Please check back or sign up for our newsletter to be notified of any updates.' },
    { cat:'Shipping', q:'How long does shipping take?', a:'Processing time is 2–5 business days after payment is received. Shipping times may vary depending on the destination and shipping method selected at checkout. A confirmation email with tracking information will be provided when available.' },
    { cat:'Returns', q:'Can I return or exchange an item?', a:'Eligible items may be returned or exchanged within 7 days of delivery, provided they are unused, in original condition, and returned with original packaging and proof of purchase. Please contact us at lumieresilk.ca@gmail.com to initiate a return.' },
    { cat:'Returns', q:'Are gift sets and accessories returnable?', a:'For hygiene and product protection reasons, certain items such as earrings or selected gift sets may be final sale unless they arrive damaged or incorrect. Please refer to the individual product description for details before purchasing.' },
    { cat:'Care', q:'How should I care for my scarf?', a:'We recommend gentle handling, hand washing with cold water and a mild detergent, avoiding harsh chemicals or bleach, and laying flat to dry away from direct sunlight. Please follow the care instructions provided on the product page for best results.' },
    { cat:'General', q:'How can I contact you?', a:'You are welcome to reach us by email at lumieresilk.ca@gmail.com. We respond within 1–2 business days. For order enquiries, please have your order number ready when you get in touch.' },
  ];

  function Header() {
    const [scrolled, setScrolled] = useState(false);
    useEffect(()=>{
      const f=()=>setScrolled(window.scrollY>20);
      window.addEventListener('scroll',f); return ()=>window.removeEventListener('scroll',f);
    },[]);
    return (
      <header style={{ position:'fixed', top:36, left:0, right:0, zIndex:1000, background: scrolled?'rgba(250,248,245,0.96)':'rgba(250,248,245,0.88)', backdropFilter:'blur(12px)', borderBottom:`1px solid ${scrolled?'var(--ls-border)':'transparent'}`, transition:'all 0.35s', padding:'18px 0' }}>
        <div style={{ ...C, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <a href="Lumiere Silk Homepage.html" style={{ fontFamily:'var(--ls-serif)', fontSize:22, letterSpacing:'0.08em' }}>Lumière Silk</a>
          <nav style={{ display:'flex', alignItems:'center' }}>
            {NAV.map(([label, href]) => {
              const [h, setH] = useState(false);
              const isActive = label === 'FAQ';
              return (
                <a key={label} href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
                  style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase', color: isActive?'var(--ls-warm-black)':h?'var(--ls-warm-black)':'var(--ls-muted)', padding:'0 16px', transition:'color 0.2s', borderBottom: isActive?'1px solid var(--ls-gold)':'none', paddingBottom: isActive?4:0 }}>
                  {label}
                </a>
              );
            })}
          </nav>
          <div style={{ display:'flex', gap:18 }}>
            {[<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            ].map((icon,i)=>{
              const [h,setH]=useState(false);
              return <button key={i} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ background:'none',border:'none',cursor:'pointer',color:h?'var(--ls-gold)':'var(--ls-warm-black)',transition:'color 0.2s',display:'flex',padding:4 }}>{icon}</button>;
            })}
          </div>
        </div>
      </header>
    );
  }

  function PageHero() {
    return (
      <section style={{ background:'var(--ls-blush)', padding:'120px 0 60px', textAlign:'center', borderBottom:'1px solid var(--ls-border)' }}>
        <span style={eyebrow}>Support</span>
        <h1 style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(36px,5vw,62px)', fontWeight:400, lineHeight:1.08, marginBottom:16 }}>Frequently Asked<br /><em style={{ fontStyle:'italic' }}>Questions</em></h1>
        <p style={{ ...body14, maxWidth:420, margin:'0 auto' }}>Everything you need to know about Lumière Silk, our products, shipping, and returns.</p>
      </section>
    );
  }

  function AccordionItem({ q, a, isOpen, onToggle }) {
    return (
      <div style={{ borderBottom:'1px solid var(--ls-border)' }}>
        <button onClick={onToggle} style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', gap:24, padding:'22px 0', background:'none', border:'none', cursor:'pointer', textAlign:'left' }}>
          <span style={{ fontFamily:'var(--ls-serif)', fontSize:18, fontWeight:400, color: isOpen?'var(--ls-gold)':'var(--ls-warm-black)', lineHeight:1.3, transition:'color 0.2s' }}>{q}</span>
          <span style={{ flexShrink:0, width:28, height:28, border:`1px solid ${isOpen?'var(--ls-gold)':'var(--ls-border)'}`, display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.25s', background: isOpen?'var(--ls-gold)':'transparent' }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={isOpen?'#fff':'var(--ls-muted)'} strokeWidth="2" style={{ transform: isOpen?'rotate(45deg)':'rotate(0)', transition:'transform 0.25s' }}>
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </span>
        </button>
        <div style={{ overflow:'hidden', maxHeight: isOpen?500:0, transition:'max-height 0.35s ease', paddingBottom: isOpen?20:0 }}>
          <p style={{ ...body14, paddingRight:52 }}>{a}</p>
        </div>
      </div>
    );
  }

  function FAQSection() {
    const [open, setOpen] = useState(null);
    const [activeTab, setActiveTab] = useState('All');
    const cats = ['All', ...Array.from(new Set(FAQS.map(f => f.cat)))];
    const filtered = activeTab === 'All' ? FAQS : FAQS.filter(f => f.cat === activeTab);

    return (
      <section style={{ padding:'80px 0', background:'var(--ls-ivory)' }}>
        <div style={{ ...C, maxWidth:900, margin:'0 auto', padding:'0 32px' }}>
          {/* Category tabs */}
          <div style={{ display:'flex', gap:0, marginBottom:48, borderBottom:'1px solid var(--ls-border)' }}>
            {cats.map(cat => (
              <button key={cat} onClick={()=>{ setActiveTab(cat); setOpen(null); }}
                style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', padding:'12px 24px', background:'none', border:'none', cursor:'pointer', color: activeTab===cat?'var(--ls-warm-black)':'var(--ls-muted)', borderBottom: activeTab===cat?'2px solid var(--ls-gold)':'2px solid transparent', marginBottom:-1, transition:'all 0.2s' }}>
                {cat}
              </button>
            ))}
          </div>

          {/* Accordion */}
          <div>
            {filtered.map((faq, i) => (
              <AccordionItem key={faq.q} q={faq.q} a={faq.a} isOpen={open===i} onToggle={()=>setOpen(open===i?null:i)} />
            ))}
          </div>

          {/* Still have questions */}
          <div style={{ marginTop:64, padding:'40px', background:'var(--ls-cream)', textAlign:'center', border:'1px solid var(--ls-border)' }}>
            <span style={{ ...eyebrow, justifyContent:'center', display:'block' }}>Still have questions?</span>
            <h3 style={{ fontFamily:'var(--ls-serif)', fontSize:26, fontWeight:400, marginBottom:12 }}>We're happy to help</h3>
            <p style={{ ...body14, marginBottom:28 }}>Reach out directly and we'll get back to you within 1–2 business days.</p>
            <ContactBtn />
          </div>
        </div>
      </section>
    );
  }

  function ContactBtn() {
    const [hov, setHov] = useState(false);
    return (
      <a href="Lumiere Silk Contact.html" onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', padding:'14px 32px', border:'1px solid var(--ls-warm-black)', background: hov?'transparent':'var(--ls-warm-black)', color: hov?'var(--ls-warm-black)':'var(--ls-ivory)', transition:'all 0.3s', cursor:'pointer' }}>
        Contact Us
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    );
  }

  function Footer() {
    const cols = [
      { title:'Shop', links:['All Products','Silk Scarves','Gift Sets'] },
      { title:'Help', links:['FAQ','Shipping Policy','Return Policy','Privacy Policy'] },
      { title:'Company', links:['About Us','Contact','Services'] },
    ];
    return (
      <footer style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', padding:'72px 0 0' }}>
        <div style={C}>
          <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap:48, marginBottom:60 }}>
            <div>
              <div style={{ fontFamily:'var(--ls-serif)', fontSize:20, letterSpacing:'0.08em', marginBottom:16 }}>Lumière Silk</div>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, lineHeight:1.8, color:'rgba(250,248,245,0.5)', maxWidth:240 }}>Elegant silk scarves and gift-ready pieces, designed with softness, refinement, and timeless beauty.</p>
            </div>
            {cols.map(col => (
              <div key={col.title}>
                <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--ls-ivory)', marginBottom:20, fontWeight:500 }}>{col.title}</p>
                <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                  {col.links.map(link => {
                    const [h,setH]=useState(false);
                    return <a key={link} href="#" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:h?'var(--ls-ivory)':'rgba(250,248,245,0.5)', transition:'color 0.2s' }}>{link}</a>;
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(250,248,245,0.1)', padding:'20px 32px', display:'flex', justifyContent:'space-between' }}>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>© 2026 Lumière Silk. All rights reserved.</p>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>lumieresilk.ca@gmail.com</p>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <div>
        <div style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', textAlign:'center', padding:'11px 0' }}>Free shipping on orders over $75 · Canada-wide delivery</div>
        <div style={{ height:36 }}></div>
        <Header />
        <main style={{ paddingTop:36 }}>
          <PageHero />
          <FAQSection />
        </main>
        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
