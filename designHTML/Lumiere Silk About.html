<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Lumière Silk</title>
  <meta name="ext-resource-dependency" content="uploads/brand-world.jpg" data-resource-id="heroImg" />
  <meta name="ext-resource-dependency" content="uploads/brand-intro.jpg" data-resource-id="brandIntroImg" />
  <meta name="ext-resource-dependency" content="uploads/lifestyle-1.jpg" data-resource-id="lifestyleImg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --ls-gold:#c9a96e; --ls-gold-light:#dfc49a; --ls-warm-black:#2a2218;
      --ls-ivory:#faf8f5; --ls-cream:#f5f0e8; --ls-blush:#f0e8e4;
      --ls-sage:#c4d4c0; --ls-border:#e8e2d9; --ls-muted:#8a7d6f;
      --ls-serif:'Cormorant Garamond',Georgia,serif; --ls-sans:'Inter',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--ls-sans);background:var(--ls-ivory);color:var(--ls-warm-black);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    img{display:block;max-width:100%;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--ls-cream);}
    ::-webkit-scrollbar-thumb{background:var(--ls-gold-light);border-radius:3px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;

  const C = {
    maxWidth:1280, margin:'0 auto', padding:'0 32px'
  };
  const eyebrow = { display:'block', fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.3em', textTransform:'uppercase', color:'var(--ls-gold)', marginBottom:14 };
  const serifXL = { fontFamily:'var(--ls-serif)', fontWeight:400, lineHeight:1.08, color:'var(--ls-warm-black)', fontSize:'clamp(32px,5vw,58px)', margin:'0 0 20px' };
  const serifLG = { fontFamily:'var(--ls-serif)', fontWeight:400, lineHeight:1.1, color:'var(--ls-warm-black)', fontSize:'clamp(26px,4vw,44px)', margin:'0 0 16px' };
  const body14 = { fontFamily:'var(--ls-sans)', fontSize:14, lineHeight:1.85, color:'var(--ls-muted)' };

  const NAV = [
    ['Home','Lumiere Silk Homepage.html'],
    ['Shop','#'],
    ['About','Lumiere Silk About.html'],
    ['Contact','Lumiere Silk Contact.html'],
    ['FAQ','Lumiere Silk FAQ.html'],
  ];

  function Btn({ children, href='#', dark=true, style={} }) {
    const [hov, setHov] = useState(false);
    return (
      <a href={href} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
        style={{ display:'inline-flex', alignItems:'center', gap:8, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.16em', textTransform:'uppercase', padding:'14px 32px', border:`1px solid ${dark?'var(--ls-warm-black)':'rgba(250,248,245,0.4)'}`, background: hov ? (dark?'transparent':'rgba(250,248,245,0.1)') : (dark?'var(--ls-warm-black)':'transparent'), color: hov ? (dark?'var(--ls-warm-black)':'var(--ls-ivory)') : (dark?'var(--ls-ivory)':' rgba(250,248,245,0.85)'), transition:'all 0.3s', cursor:'pointer', ...style }}>
        {children}
      </a>
    );
  }

  function Header() {
    const [scrolled, setScrolled] = useState(false);
    const [shopOpen, setShopOpen] = useState(false);
    useEffect(()=>{
      const f=()=>setScrolled(window.scrollY>20);
      window.addEventListener('scroll',f); return ()=>window.removeEventListener('scroll',f);
    },[]);
    return (
      <header style={{ position:'fixed', top:36, left:0, right:0, zIndex:1000, background: scrolled?'rgba(250,248,245,0.96)':'rgba(250,248,245,0.88)', backdropFilter:'blur(12px)', borderBottom:`1px solid ${scrolled?'var(--ls-border)':'transparent'}`, transition:'all 0.35s', padding:'18px 0' }}>
        <div style={{ ...C, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <a href="Lumiere Silk Homepage.html" style={{ fontFamily:'var(--ls-serif)', fontSize:22, letterSpacing:'0.08em' }}>Lumière Silk</a>
          <nav style={{ display:'flex', alignItems:'center' }}>
            {NAV.map(([label, href]) => {
              const [h, setH] = useState(false);
              const isActive = label === 'About';
              return (
                <a key={label} href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
                  style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.2em', textTransform:'uppercase', color: isActive ? 'var(--ls-warm-black)' : h?'var(--ls-warm-black)':'var(--ls-muted)', padding:'0 16px', transition:'color 0.2s', borderBottom: isActive ? '1px solid var(--ls-gold)' : 'none', paddingBottom: isActive ? 4 : 0 }}>
                  {label}
                </a>
              );
            })}
          </nav>
          <div style={{ display:'flex', gap:18 }}>
            {[<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            ].map((icon, i) => {
              const [h, setH] = useState(false);
              return <button key={i} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ background:'none', border:'none', cursor:'pointer', color:h?'var(--ls-gold)':'var(--ls-warm-black)', transition:'color 0.2s', display:'flex', padding:4 }}>{icon}</button>;
            })}
          </div>
        </div>
      </header>
    );
  }

  function Announcement() {
    return <div style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', textAlign:'center', padding:'11px 0' }}>Free shipping on orders over $75 · Canada-wide delivery</div>;
  }

  /* ── Page Hero ─── */
  function PageHero() {
    return (
      <section style={{ position:'relative', height:'60vh', overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <img src={window.__resources.heroImg} alt="About Lumière Silk" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center' }} />
        <div style={{ position:'absolute', inset:0, background:'rgba(42,34,24,0.45)' }}></div>
        <div style={{ position:'relative', zIndex:2, textAlign:'center' }}>
          <span style={{ ...eyebrow, color:'rgba(250,248,245,0.6)', marginBottom:16 }}>Our Story</span>
          <h1 style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(38px,6vw,72px)', fontWeight:400, color:'var(--ls-ivory)', lineHeight:1.06, letterSpacing:'0.01em' }}>The World of<br /><em style={{ fontStyle:'italic' }}>Lumière Silk</em></h1>
        </div>
      </section>
    );
  }

  /* ── Brand Story ─── */
  function StorySection() {
    return (
      <section style={{ padding:'96px 0', background:'var(--ls-ivory)' }}>
        <div style={C}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:72, alignItems:'center' }}>
            <div>
              <span style={eyebrow}>Who We Are</span>
              <h2 style={serifXL}>Crafted from a<br /><em style={{ fontStyle:'italic' }}>love of elegance</em></h2>
              <p style={{ ...body14, marginBottom:20 }}>Lumière Silk was created from a deep love of elegance, beauty, and thoughtful design. We believe the smallest details can make a lasting impression — that a beautifully chosen piece can bring quiet confidence, warmth, and joy.</p>
              <p style={{ ...body14, marginBottom:32 }}>Our vision is to create a brand that feels soft, polished, and timeless — a place where silk, presentation, and gifting come together with grace. Every product is chosen with care, selected to offer an elevated experience for both personal use and meaningful gifting.</p>
              <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                {['Rooted in elegance and refinement', 'Premium materials, thoughtfully selected', 'Gift-ready presentation at its heart', 'Made for those who appreciate quiet luxury'].map(v => (
                  <div key={v} style={{ display:'flex', alignItems:'center', gap:12 }}>
                    <div style={{ width:5, height:5, background:'var(--ls-gold)', flexShrink:0 }}></div>
                    <span style={{ ...body14, fontSize:13 }}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ position:'relative' }}>
              <div style={{ aspectRatio:'3/4', overflow:'hidden' }}>
                <img src={window.__resources.brandIntroImg} alt="Lumière Silk brand" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
              </div>
              <div style={{ position:'absolute', top:16, right:-16, bottom:-16, left:16, border:'1px solid var(--ls-gold-light)', zIndex:-1, opacity:0.5 }}></div>
            </div>
          </div>
        </div>
      </section>
    );
  }

  /* ── Values ─── */
  function ValuesSection() {
    const values = [
      { title:'Timeless Quality', body:'Every piece in our collection is chosen for its beauty, texture, and enduring elegance. We select only what feels truly refined.' },
      { title:'Thoughtful Gifting', body:'We believe giving should be as beautiful as the gift itself. From packaging to presentation, every detail is considered.' },
      { title:'Quiet Luxury', body:'Lumière Silk is not about excess — it is about the quiet, confident beauty of a perfectly chosen piece worn with grace.' },
    ];
    return (
      <section style={{ padding:'80px 0', background:'var(--ls-cream)' }}>
        <div style={C}>
          <div style={{ textAlign:'center', marginBottom:56 }}>
            <span style={eyebrow}>Our Values</span>
            <h2 style={{ ...serifLG, textAlign:'center' }}>What We Believe In</h2>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:40 }}>
            {values.map(({ title, body }) => (
              <div key={title} style={{ padding:'40px 32px', background:'var(--ls-ivory)', border:'1px solid var(--ls-border)', textAlign:'center' }}>
                <div style={{ width:32, height:1, background:'var(--ls-gold)', margin:'0 auto 24px' }}></div>
                <h3 style={{ fontFamily:'var(--ls-serif)', fontSize:22, fontWeight:400, color:'var(--ls-warm-black)', marginBottom:14 }}>{title}</h3>
                <p style={{ ...body14, fontSize:13 }}>{body}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  }

  /* ── Lifestyle Image ─── */
  function LifestyleSection() {
    return (
      <section style={{ position:'relative', height:500, overflow:'hidden' }}>
        <img src={window.__resources.lifestyleImg} alt="Lumière Silk collection" style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 40%' }} />
        <div style={{ position:'absolute', inset:0, background:'rgba(42,34,24,0.35)' }}></div>
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', textAlign:'center' }}>
          <div>
            <p style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(22px,3vw,36px)', fontStyle:'italic', color:'var(--ls-ivory)', marginBottom:24, lineHeight:1.4 }}>"Beautifully crafted for those who appreciate<br />the quiet luxury of silk."</p>
            <Btn href="Lumiere Silk Homepage.html" dark={false}>Shop the Collection</Btn>
          </div>
        </div>
      </section>
    );
  }

  /* ── Footer ─── */
  function Footer() {
    const cols = [
      { title:'Shop', links:['All Products','Silk Scarves','Gift Sets'] },
      { title:'Help', links:['FAQ','Shipping Policy','Return Policy','Privacy Policy'] },
      { title:'Company', links:['About Us','Contact','Services'] },
    ];
    return (
      <footer style={{ background:'var(--ls-warm-black)', color:'var(--ls-ivory)', padding:'72px 0 0' }}>
        <div style={C}>
          <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr 1fr 1fr', gap:48, marginBottom:60 }}>
            <div>
              <div style={{ fontFamily:'var(--ls-serif)', fontSize:20, letterSpacing:'0.08em', marginBottom:16 }}>Lumière Silk</div>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:13, lineHeight:1.8, color:'rgba(250,248,245,0.5)', maxWidth:240 }}>Elegant silk scarves and gift-ready pieces, designed with softness, refinement, and timeless beauty in mind.</p>
            </div>
            {cols.map(col => (
              <div key={col.title}>
                <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--ls-ivory)', marginBottom:20, fontWeight:500 }}>{col.title}</p>
                <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                  {col.links.map(link => {
                    const [h, setH] = useState(false);
                    return <a key={link} href="#" onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:h?'var(--ls-ivory)':'rgba(250,248,245,0.5)', transition:'color 0.2s' }}>{link}</a>;
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ borderTop:'1px solid rgba(250,248,245,0.1)', padding:'20px 32px', display:'flex', justifyContent:'space-between' }}>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>© 2026 Lumière Silk. All rights reserved.</p>
          <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'rgba(250,248,245,0.3)' }}>lumieresilk.ca@gmail.com</p>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <div>
        <Announcement />
        <div style={{ height:36 }}></div>
        <Header />
        <main style={{ paddingTop:36 }}>
          <PageHero />
          <StorySection />
          <ValuesSection />
          <LifestyleSection />
        </main>
        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
<template id="__bundler_thumbnail" data-bg-color="#faf8f5">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#faf8f5"/>
    <rect x="0" y="0" width="1200" height="480" fill="#f0e8e4"/>
    <rect x="0" y="0" width="1200" height="480" fill="rgba(42,34,24,0.4)"/>
    <text x="600" y="200" font-family="Georgia,serif" font-size="72" font-weight="400" fill="#faf8f5" text-anchor="middle" font-style="italic">Lumière Silk</text>
    <text x="600" y="260" font-family="Arial,sans-serif" font-size="18" fill="rgba(250,248,245,0.6)" text-anchor="middle" letter-spacing="8">THE WORLD OF LUMIÈRE</text>
    <rect x="200" y="540" width="360" height="180" fill="#f5f0e8" rx="0"/>
    <rect x="640" y="540" width="360" height="80" fill="#e8e2d9" rx="0"/>
    <rect x="640" y="640" width="260" height="80" fill="#e8e2d9" rx="0"/>
    <rect x="560" y="470" width="80" height="3" fill="#c9a96e"/>
  </svg>
</template>
</html>
