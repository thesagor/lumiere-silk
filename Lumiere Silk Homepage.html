<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumière Silk — Silk Scarves, Designed for Gifting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --ls-ivory: #faf6ef;
      --ls-cream: #f3ebdd;
      --ls-champagne: #e8dcc6;
      --ls-beige: #d8c8ac;
      --ls-blush: #efe1d3;
      --ls-gold: #b89968;
      --ls-gold-soft: #d6bf94;
      --ls-ink: #3d342a;
      --ls-muted: #8b7d6b;
      --ls-line: #e6dcc8;
      --ls-warm-black: #2a2218;
      --ls-serif: 'Cormorant Garamond', Georgia, serif;
      --ls-sans: 'Inter', system-ui, sans-serif;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { font-family:var(--ls-sans); background:var(--ls-ivory); color:var(--ls-ink); -webkit-font-smoothing:antialiased; overflow-x:hidden; font-weight:300; }
    a { text-decoration:none; color:inherit; }
    img { display:block; max-width:100%; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--ls-cream); }
    ::-webkit-scrollbar-thumb { background:var(--ls-gold-soft); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slowZoom { from { transform:scale(1.06); } to { transform:scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Type system ─── */
    const eyebrow = { display:'inline-block', fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', color:'var(--ls-gold)', fontWeight:400 };
    const eyebrowLight = { ...eyebrow, color:'rgba(184,153,104,0.7)' };
    const editorialXL = { fontFamily:'var(--ls-serif)', fontWeight:300, lineHeight:1.02, color:'var(--ls-ink)', fontSize:'clamp(48px,7.5vw,108px)', letterSpacing:'-0.01em' };
    const editorialL = { fontFamily:'var(--ls-serif)', fontWeight:300, lineHeight:1.06, color:'var(--ls-ink)', fontSize:'clamp(36px,5vw,68px)', letterSpacing:'-0.005em' };
    const editorialM = { fontFamily:'var(--ls-serif)', fontWeight:400, lineHeight:1.1, color:'var(--ls-ink)', fontSize:'clamp(26px,3.4vw,42px)' };
    const body14 = { fontFamily:'var(--ls-sans)', fontSize:14, lineHeight:1.85, color:'var(--ls-muted)', fontWeight:300 };
    const body13 = { fontFamily:'var(--ls-sans)', fontSize:13, lineHeight:1.85, color:'var(--ls-muted)', fontWeight:300 };
    const container = { maxWidth:1440, margin:'0 auto', padding:'0 40px' };

    const NAV = [
      ['Home','Lumiere Silk Homepage.html'],
      ['Shop','#'],
      ['About','Lumiere Silk About.html'],
      ['Contact','Lumiere Silk Contact.html'],
      ['FAQ','Lumiere Silk FAQ.html'],
    ];

    /* ── Buttons ─── */
    function BtnLink({ children, href='#', light=false }) {
      const [hov, setHov] = useState(false);
      const color = light ? 'var(--ls-ivory)' : 'var(--ls-ink)';
      return (
        <a href={href} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
           style={{ display:'inline-flex', alignItems:'center', gap:14, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.24em', textTransform:'uppercase', color, fontWeight:400, paddingBottom:6, borderBottom:`1px solid ${hov ? color : 'transparent'}`, transition:'border-color 0.4s' }}>
          {children}
          <span style={{ display:'inline-block', width: hov ? 28 : 18, height:1, background:color, transition:'width 0.4s' }}></span>
        </a>
      );
    }

    function BtnGhost({ children, href='#', light=false }) {
      const [hov, setHov] = useState(false);
      const base = light
        ? { border:'1px solid rgba(250,246,239,0.5)', color:'var(--ls-ivory)', background: hov ? 'rgba(250,246,239,0.08)' : 'transparent' }
        : { border:'1px solid var(--ls-ink)', color: hov ? 'var(--ls-ivory)' : 'var(--ls-ink)', background: hov ? 'var(--ls-ink)' : 'transparent' };
      return (
        <a href={href} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
           style={{ display:'inline-flex', alignItems:'center', gap:10, fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.22em', textTransform:'uppercase', padding:'15px 32px', fontWeight:400, transition:'all 0.35s', cursor:'pointer', ...base }}>
          {children}
        </a>
      );
    }

    /* ── Announcement ─── */
    function Announcement() {
      return (
        <div style={{ background:'var(--ls-cream)', color:'var(--ls-ink)', fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.26em', textTransform:'uppercase', textAlign:'center', padding:'10px 0', fontWeight:400, borderBottom:'1px solid var(--ls-line)' }}>
          Complimentary shipping on Canadian orders over $75 · Gift-ready packaging on every order
        </div>
      );
    }

    /* ── Header ─── */
    function Header() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(()=>{
        const f=()=>setScrolled(window.scrollY>40);
        window.addEventListener('scroll',f); return ()=>window.removeEventListener('scroll',f);
      },[]);
      return (
        <header style={{ position:'fixed', top:35, left:0, right:0, zIndex:1000, background: scrolled ? 'rgba(250,246,239,0.94)' : 'transparent', backdropFilter: scrolled ? 'blur(14px)' : 'none', borderBottom:`1px solid ${scrolled ? 'var(--ls-line)' : 'transparent'}`, transition:'all 0.4s', padding: scrolled ? '14px 0' : '22px 0' }}>
          <div style={{ ...container, display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', gap:32 }}>
            <nav style={{ display:'flex', gap:36 }}>
              {NAV.slice(0,3).map(([label,href]) => <NavLink key={label} label={label} href={href} active={label==='Home'} scrolled={scrolled} />)}
            </nav>
            <a href="Lumiere Silk Homepage.html" style={{ fontFamily:'var(--ls-serif)', fontSize:scrolled?22:26, letterSpacing:'0.16em', color: scrolled ? 'var(--ls-ink)' : 'var(--ls-ivory)', fontWeight:400, textAlign:'center', transition:'all 0.3s', textShadow: scrolled ? 'none' : '0 1px 12px rgba(0,0,0,0.18)' }}>
              LUMIÈRE SILK
            </a>
            <div style={{ display:'flex', justifyContent:'flex-end', gap:32, alignItems:'center' }}>
              {NAV.slice(3).map(([label,href]) => <NavLink key={label} label={label} href={href} scrolled={scrolled} />)}
              <div style={{ display:'flex', gap:18, paddingLeft:20, borderLeft:`1px solid ${scrolled ? 'var(--ls-line)' : 'rgba(250,246,239,0.3)'}` }}>
                <IconBtn scrolled={scrolled}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></IconBtn>
                <IconBtn scrolled={scrolled}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></IconBtn>
              </div>
            </div>
          </div>
        </header>
      );
    }
    function NavLink({ label, href, active, scrolled }) {
      const [h,setH] = useState(false);
      const baseColor = scrolled ? 'var(--ls-muted)' : 'rgba(250,246,239,0.85)';
      const hoverColor = scrolled ? 'var(--ls-ink)' : 'var(--ls-ivory)';
      return (
        <a href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
          style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.24em', textTransform:'uppercase', color: (h||active) ? hoverColor : baseColor, fontWeight:400, transition:'color 0.3s', position:'relative' }}>
          {label}
          {active && <span style={{ position:'absolute', left:'50%', bottom:-6, transform:'translateX(-50%)', width:3, height:3, background:'var(--ls-gold)', borderRadius:'50%' }}></span>}
        </a>
      );
    }
    function IconBtn({ children, scrolled }) {
      const [h,setH]=useState(false);
      const base = scrolled ? 'var(--ls-ink)' : 'var(--ls-ivory)';
      return <button onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ background:'none', border:'none', cursor:'pointer', color: h ? 'var(--ls-gold)' : base, transition:'color 0.2s', display:'flex', padding:0 }}>{children}</button>;
    }

    /* ── HERO ─── editorial cover */
    function Hero() {
      return (
        <section style={{ position:'relative', height:'100vh', minHeight:720, overflow:'hidden', background:'var(--ls-cream)' }}>
          <img src="uploads/products/sig-scarf-1.png" alt="Silk scarf editorial" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 18%', animation:'slowZoom 8s ease-out forwards' }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, rgba(42,34,24,0.32) 0%, rgba(42,34,24,0.05) 35%, rgba(42,34,24,0.05) 65%, rgba(42,34,24,0.45) 100%)' }}></div>

          {/* Editorial issue marker top-right */}
          <div style={{ position:'absolute', top:140, right:60, color:'rgba(250,246,239,0.85)', textAlign:'right', animation:'fadeIn 1.2s ease 0.3s both', writingMode:'vertical-rl', transform:'rotate(180deg)' }}>
            <span style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.4em', textTransform:'uppercase' }}>Issue 01 — The Gifting Edit</span>
          </div>

          {/* Centered editorial mark */}
          <div style={{ position:'absolute', left:'50%', top:'48%', transform:'translate(-50%,-50%)', textAlign:'center', color:'var(--ls-ivory)', maxWidth:920, padding:'0 32px', animation:'fadeUp 1.4s ease 0.2s both' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:16, marginBottom:32, opacity:0.85 }}>
              <span style={{ width:48, height:1, background:'rgba(250,246,239,0.5)' }}></span>
              <span style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.5em', textTransform:'uppercase' }}>Lumière Silk</span>
              <span style={{ width:48, height:1, background:'rgba(250,246,239,0.5)' }}></span>
            </div>
            <h1 style={{ fontFamily:'var(--ls-serif)', fontWeight:300, fontSize:'clamp(56px,9vw,140px)', lineHeight:0.95, letterSpacing:'-0.015em', marginBottom:32 }}>
              Silk Scarves,<br /><em style={{ fontStyle:'italic', color:'rgba(250,246,239,0.96)' }}>Designed for Gifting.</em>
            </h1>
            <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:'clamp(15px,1.4vw,19px)', lineHeight:1.6, maxWidth:520, margin:'0 auto', color:'rgba(250,246,239,0.78)', fontWeight:300 }}>
              Elegant, ready-to-gift pieces designed to make every moment feel special.
            </p>
          </div>

          {/* Bottom row: CTAs + scroll indicator */}
          <div style={{ position:'absolute', left:0, right:0, bottom:48, display:'flex', justifyContent:'center', gap:18, animation:'fadeUp 1.6s ease 0.6s both' }}>
            <BtnGhost light href="#shop">Shop Gift Sets</BtnGhost>
            <BtnGhost light href="#shop">Shop Scarves</BtnGhost>
          </div>

          {/* Subtle scroll cue right edge */}
          <div style={{ position:'absolute', right:32, bottom:48, display:'flex', flexDirection:'column', alignItems:'center', gap:10, color:'rgba(250,246,239,0.7)', animation:'fadeIn 2s ease 1s both' }}>
            <span style={{ fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.4em', textTransform:'uppercase', writingMode:'vertical-rl' }}>Scroll</span>
            <span style={{ width:1, height:32, background:'rgba(250,246,239,0.5)' }}></span>
          </div>
        </section>
      );
    }

    /* ── Mantra strip ─── single editorial line */
    function Mantra() {
      return (
        <section style={{ background:'var(--ls-ivory)', padding:'88px 32px', textAlign:'center' }}>
          <div style={{ maxWidth:920, margin:'0 auto' }}>
            <div style={{ display:'inline-flex', alignItems:'center', gap:14, marginBottom:24 }}>
              <span style={{ width:24, height:1, background:'var(--ls-gold)' }}></span>
              <span style={eyebrow}>The Lumière Promise</span>
              <span style={{ width:24, height:1, background:'var(--ls-gold)' }}></span>
            </div>
            <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:'clamp(24px,3.4vw,42px)', lineHeight:1.3, fontWeight:300, color:'var(--ls-ink)', letterSpacing:'-0.005em' }}>
              More than a scarf — a&nbsp;refined gifting experience.
            </p>
          </div>
        </section>
      );
    }

    /* ── Silk Texture full-bleed ─── */
    function TextureSection() {
      return (
        <section style={{ position:'relative', height:'85vh', minHeight:560, overflow:'hidden' }}>
          <img src="uploads/products/detail-4.png" alt="Silk texture" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover' }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(120deg, rgba(42,34,24,0.18) 0%, rgba(42,34,24,0) 60%)' }}></div>

          {/* Left editorial label */}
          <div style={{ position:'absolute', left:60, top:'50%', transform:'translateY(-50%)', maxWidth:380, color:'var(--ls-ink)' }}>
            <div style={{ display:'inline-block', padding:'22px 26px', background:'rgba(250,246,239,0.88)', backdropFilter:'blur(8px)', border:'1px solid rgba(184,153,104,0.25)' }}>
              <span style={eyebrow}>Material · Plate 01</span>
              <h3 style={{ ...editorialM, marginTop:14, fontStyle:'italic', fontWeight:300 }}>The hand of pure silk.</h3>
              <p style={{ ...body13, marginTop:14, color:'var(--ls-ink)', opacity:0.75 }}>
                Soft, fluid, weightless — chosen for the way it falls, the way it holds light, and the way it feels close to the skin.
              </p>
            </div>
          </div>

          {/* Caption corner */}
          <div style={{ position:'absolute', right:48, bottom:48, color:'rgba(250,246,239,0.85)', textAlign:'right' }}>
            <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase' }}>Detail / 100% Mulberry Silk</p>
          </div>
        </section>
      );
    }

    /* ── Featured Pieces ─── editorial asymmetric grid */
    const PRODUCTS = [
      { name:'Signature Silk Scarf',     price:'$89',  size:'90 × 90 cm',  img:'uploads/products/sig-scarf-1.png',          pos:'center 15%', tag:'Bestseller' },
      { name:'Elegant Silk Scarf',       price:'$89',  size:'90 cm Square', img:'uploads/products/elegant-scarf-3.png',     pos:'left center', tag:'New Arrival' },
      { name:'Petite Silk Scarf',        price:'$59',  size:'53 × 53 cm',   img:'uploads/products/small-scarf-styled-1.png', pos:'center top', tag:'Versatile' },
      { name:'Silk Scarf Gift Box',      price:'$119', size:'Gift Set',     img:'uploads/products/small-scarf-1.png',        pos:'center', tag:'Gift Ready' },
    ];

    function FeaturedPieces() {
      return (
        <section id="shop" style={{ background:'var(--ls-ivory)', padding:'120px 0 100px' }}>
          <div style={container}>
            {/* Header — editorial split */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:60, marginBottom:72, alignItems:'end' }}>
              <div>
                <span style={eyebrow}>The Collection · 01</span>
                <h2 style={{ ...editorialL, marginTop:22 }}>
                  Pieces<br /><em style={{ fontStyle:'italic', color:'var(--ls-gold)' }}>made to be given.</em>
                </h2>
              </div>
              <div style={{ paddingBottom:8 }}>
                <p style={{ ...body14, maxWidth:380, marginBottom:18 }}>
                  Timeless designs created to feel soft, elegant, and effortless — perfect for both everyday wear and meaningful gifting.
                </p>
                <BtnLink href="#">View All Pieces</BtnLink>
              </div>
            </div>

            {/* Editorial grid: tall hero left, stacked right */}
            <div style={{ display:'grid', gridTemplateColumns:'1.15fr 1fr', gap:32, marginBottom:32 }}>
              <FeatureCard product={PRODUCTS[0]} tall />
              <div style={{ display:'grid', gridTemplateRows:'1fr 1fr', gap:32 }}>
                <FeatureCardWide product={PRODUCTS[1]} />
                <FeatureCardWide product={PRODUCTS[3]} />
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1.2fr', gap:32 }}>
              <FeatureCardWide product={PRODUCTS[2]} />
              <EditorialNote />
            </div>
          </div>
        </section>
      );
    }

    function FeatureCard({ product, tall }) {
      const [hov,setHov] = useState(false);
      return (
        <a href="#" onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{ display:'block', position:'relative' }}>
          <div style={{ position:'relative', overflow:'hidden', aspectRatio: tall ? '4/5.6' : '4/5', background:'var(--ls-cream)' }}>
            <img src={product.img} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition: product.pos, transform: hov ? 'scale(1.04)' : 'scale(1)', transition:'transform 1.2s cubic-bezier(0.2,0.8,0.2,1)' }} />
            <div style={{ position:'absolute', top:18, left:18, padding:'7px 12px', background:'rgba(250,246,239,0.92)', backdropFilter:'blur(6px)', fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.3em', textTransform:'uppercase', color:'var(--ls-ink)', fontWeight:400 }}>
              {product.tag}
            </div>
            <div style={{ position:'absolute', right:18, bottom:18, width:42, height:42, borderRadius:'50%', background:'var(--ls-ivory)', display:'flex', alignItems:'center', justifyContent:'center', opacity: hov ? 1 : 0, transform: hov ? 'translateY(0)' : 'translateY(8px)', transition:'all 0.4s' }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
          </div>
          <div style={{ paddingTop:20, display:'flex', justifyContent:'space-between', alignItems:'baseline', borderBottom:'1px solid var(--ls-line)', paddingBottom:18 }}>
            <div>
              <h4 style={{ fontFamily:'var(--ls-serif)', fontSize:22, fontWeight:400, color:'var(--ls-ink)', marginBottom:6 }}>{product.name}</h4>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ls-muted)' }}>{product.size}</p>
            </div>
            <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:20, color:'var(--ls-ink)' }}>{product.price}</p>
          </div>
        </a>
      );
    }

    function FeatureCardWide({ product }) {
      const [hov,setHov] = useState(false);
      return (
        <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{ display:'grid', gridTemplateColumns:'1.2fr 1fr', gap:24, alignItems:'stretch', height:'100%' }}>
          <a href="#" style={{ position:'relative', overflow:'hidden', background:'var(--ls-cream)', display:'block' }}>
            <img src={product.img} alt={product.name} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition: product.pos, transform: hov ? 'scale(1.04)' : 'scale(1)', transition:'transform 1.2s cubic-bezier(0.2,0.8,0.2,1)' }} />
          </a>
          <div style={{ display:'flex', flexDirection:'column', justifyContent:'center', padding:'12px 8px' }}>
            <span style={{ fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.32em', textTransform:'uppercase', color:'var(--ls-gold)', marginBottom:14 }}>{product.tag}</span>
            <h4 style={{ fontFamily:'var(--ls-serif)', fontSize:'clamp(22px,2vw,28px)', fontWeight:400, color:'var(--ls-ink)', marginBottom:10, lineHeight:1.15 }}>{product.name}</h4>
            <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'var(--ls-muted)', marginBottom:18 }}>{product.size}</p>
            <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:22, color:'var(--ls-ink)', marginBottom:18 }}>{product.price}</p>
            <BtnLink href="#">Discover</BtnLink>
          </div>
        </div>
      );
    }

    function EditorialNote() {
      return (
        <div style={{ background:'var(--ls-cream)', padding:'56px 48px', display:'flex', flexDirection:'column', justifyContent:'center', position:'relative' }}>
          <div style={{ position:'absolute', top:24, right:24, fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:54, color:'var(--ls-gold-soft)', lineHeight:1 }}>"</div>
          <span style={eyebrow}>An Editorial Note</span>
          <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:'clamp(20px,2vw,26px)', lineHeight:1.4, fontWeight:300, color:'var(--ls-ink)', marginTop:18, marginBottom:28 }}>
            A scarf is the smallest gesture and the most generous one — it warms, it softens, it lingers in memory long after the moment is over.
          </p>
          <BtnLink href="Lumiere Silk About.html">Read Our Story</BtnLink>
        </div>
      );
    }

    /* ── Lifestyle Moment ─── full bleed image with type */
    function LifestyleMoment() {
      return (
        <section style={{ position:'relative', height:'90vh', minHeight:640, overflow:'hidden' }}>
          <img src="uploads/lifestyle-1.jpg" alt="Lumière Silk worn" style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', objectPosition:'center 35%' }} />
          <div style={{ position:'absolute', inset:0, background:'linear-gradient(90deg, rgba(42,34,24,0) 50%, rgba(42,34,24,0.55) 100%)' }}></div>

          {/* Right column type */}
          <div style={{ position:'absolute', right:0, top:0, bottom:0, width:'50%', display:'flex', alignItems:'center', padding:'0 80px' }}>
            <div style={{ maxWidth:460, color:'var(--ls-ivory)' }}>
              <span style={{ ...eyebrow, color:'rgba(250,246,239,0.7)' }}>Plate 02 · Lifestyle</span>
              <h2 style={{ ...editorialL, color:'var(--ls-ivory)', marginTop:22, marginBottom:24 }}>
                Worn close,<br /><em style={{ fontStyle:'italic' }}>kept always.</em>
              </h2>
              <p style={{ ...body14, color:'rgba(250,246,239,0.78)', marginBottom:34, fontSize:15 }}>
                A Lumière Silk piece is the kind of thing she'll reach for on the days that matter — and the ordinary ones, too. Worn at the neck, tied at the wrist, draped at the shoulder.
              </p>
              <BtnGhost light href="#">Shop Lifestyle</BtnGhost>
            </div>
          </div>
        </section>
      );
    }

    /* ── Why customers love (lighter, image-led) ─── */
    function ValueLayer() {
      const items = [
        { num:'01', title:'Ready-to-Gift', body:'Each piece arrives in our signature box — no extra wrapping required.' },
        { num:'02', title:'Premium Feel', body:'Fluid silk, refined finish, weight in every detail.' },
        { num:'03', title:'For Every Occasion', body:'Birthday, anniversary, thank-you, or simply because.' },
        { num:'04', title:'Free Canada Shipping', body:'Complimentary on orders over $75, delivered with care.' },
      ];
      return (
        <section style={{ background:'var(--ls-blush)', padding:'120px 0' }}>
          <div style={container}>
            <div style={{ textAlign:'center', maxWidth:680, margin:'0 auto 72px' }}>
              <span style={eyebrow}>Why Customers Love Lumière Silk</span>
              <h2 style={{ ...editorialL, marginTop:22 }}>Quietly considered, <em style={{ fontStyle:'italic', color:'var(--ls-gold)' }}>thoughtfully made.</em></h2>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:0, borderTop:'1px solid var(--ls-line)' }}>
              {items.map((it, i) => (
                <div key={it.num} style={{ padding:'42px 28px 32px', borderBottom:'1px solid var(--ls-line)', borderRight: i < 3 ? '1px solid var(--ls-line)' : 'none', position:'relative' }}>
                  <span style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:32, fontWeight:300, color:'var(--ls-gold)', display:'block', marginBottom:18 }}>{it.num}</span>
                  <h4 style={{ fontFamily:'var(--ls-serif)', fontSize:24, fontWeight:400, color:'var(--ls-ink)', marginBottom:12 }}>{it.title}</h4>
                  <p style={{ ...body13 }}>{it.body}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ── The Gift / Packaging editorial ─── */
    function TheGiftSection() {
      return (
        <section style={{ background:'var(--ls-ivory)', padding:'120px 0' }}>
          <div style={container}>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1.1fr', gap:80, alignItems:'center' }}>
              {/* Image stack — overlapped editorial */}
              <div style={{ position:'relative', height:680 }}>
                <div style={{ position:'absolute', top:0, left:0, width:'72%', aspectRatio:'4/5', overflow:'hidden' }}>
                  <img src="uploads/packaging/gift-box-3.png" alt="Gift box" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                </div>
                <div style={{ position:'absolute', bottom:0, right:0, width:'58%', aspectRatio:'1/1.1', overflow:'hidden', boxShadow:'-30px -30px 0 var(--ls-cream)' }}>
                  <img src="uploads/packaging/gift-box-2.png" alt="Branded box" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                </div>
                <div style={{ position:'absolute', top:'45%', left:'56%', transform:'translateY(-50%)', writingMode:'vertical-rl', fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:14, letterSpacing:'0.06em', color:'var(--ls-gold)' }}>

                </div>
              </div>
              {/* Right copy */}
              <div style={{ paddingLeft:24 }}>
                <span style={eyebrow}>The Gift · Plate 03</span>
                <h2 style={{ ...editorialL, marginTop:24 }}>

                </h2>
                <p style={{ ...body14, fontSize:15, marginTop:28, marginBottom:24, maxWidth:480 }}>
                  Beautifully packaged and ready to give. No extra effort, no extra wrapping — just a gift that feels intentional and refined from the moment it arrives.
                </p>
                <ul style={{ listStyle:'none', borderTop:'1px solid var(--ls-line)', marginBottom:36 }}>
                  {['Signature Lumière box, satin-ribbon tied','Gift card with handwritten-style note','Soft tissue & branded seal','Arrives ready to place under any tree, on any table'].map(line => (
                    <li key={line} style={{ display:'flex', gap:18, alignItems:'center', padding:'18px 0', borderBottom:'1px solid var(--ls-line)' }}>
                      <span style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:16, color:'var(--ls-gold)', width:18 }}>—</span>
                      <span style={{ ...body13, fontSize:14, color:'var(--ls-ink)' }}>{line}</span>
                    </li>
                  ))}
                </ul>
                <div style={{ display:'flex', gap:14, flexWrap:'wrap' }}>
                  <BtnGhost href="#">Shop Gift Sets</BtnGhost>
                  <BtnLink href="#">Explore Scarves</BtnLink>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function DetailTriptych() {
      const shots = [
        { src:'uploads/products/detail-3.png', label:'Hand-finished edges', pos:'center' },
        { src:'uploads/products/sig-scarf-3.png', label:'Pure mulberry silk', pos:'center top' },
        { src:'uploads/packaging/gift-box-2.png', label:'Signature presentation', pos:'center' },
      ];
      return (
        <section style={{ background:'var(--ls-cream)', padding:'0' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:0 }}>
            {shots.map((s,i) => (
              <div key={i} style={{ position:'relative', aspectRatio:'1/1.1', overflow:'hidden' }}>
                <img src={s.src} alt={s.label} style={{ width:'100%', height:'100%', objectFit:'cover', objectPosition:s.pos }} />
                <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(42,34,24,0.4) 0%, rgba(42,34,24,0) 50%)' }}></div>
                <div style={{ position:'absolute', left:24, bottom:22, color:'var(--ls-ivory)' }}>
                  <span style={{ fontFamily:'var(--ls-sans)', fontSize:9, letterSpacing:'0.4em', textTransform:'uppercase', opacity:0.7 }}>0{i+1}</span>
                  <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:20, fontWeight:300, marginTop:4 }}>{s.label}</p>
                </div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    /* ── Philosophy — soft cream, restrained ─── */
    function Philosophy() {
      return (
        <section style={{ background:'var(--ls-champagne)', padding:'140px 0', position:'relative', overflow:'hidden' }}>
          <div style={{ ...container, textAlign:'center', maxWidth:780, margin:'0 auto', position:'relative' }}>
            <span style={eyebrow}>Our Philosophy</span>
            <h2 style={{ ...editorialL, marginTop:24, marginBottom:32 }}>
              Designed in Canada,<br /><em style={{ fontStyle:'italic' }}>inspired by timeless elegance.</em>
            </h2>
            <div style={{ width:32, height:1, background:'var(--ls-gold)', margin:'0 auto 32px' }}></div>
            <p style={{ fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:'clamp(17px,1.6vw,22px)', lineHeight:1.7, color:'var(--ls-ink)', maxWidth:600, margin:'0 auto 44px', fontWeight:300, opacity:0.85 }}>

            </p>
            <BtnGhost href="Lumiere Silk About.html">Discover Our World</BtnGhost>
          </div>
        </section>
      );
    }

    /* ── Newsletter ─── soft */
    function Newsletter() {
      const [email, setEmail] = useState('');
      const [done, setDone] = useState(false);
      return (
        <section style={{ background:'var(--ls-cream)', padding:'90px 0' }}>
          <div style={{ ...container, textAlign:'center', maxWidth:540, margin:'0 auto' }}>
            <span style={eyebrow}>Stay Close</span>
            <h3 style={{ ...editorialM, marginTop:18, marginBottom:14 }}>Join the Lumière Circle</h3>
            <p style={{ ...body13 }}>Receive new arrivals, gifting guides, and quiet inspiration in your inbox.</p>
            {done ? (
              <p style={{ marginTop:32, fontFamily:'var(--ls-serif)', fontStyle:'italic', fontSize:18, color:'var(--ls-gold)' }}>Thank you — welcome.</p>
            ) : (
              <form onSubmit={e=>{e.preventDefault(); if(email) setDone(true);}} style={{ marginTop:32, display:'flex', borderBottom:'1px solid var(--ls-ink)' }}>
                <input type="email" required placeholder="Your email address" value={email} onChange={e=>setEmail(e.target.value)} style={{ flex:1, fontFamily:'var(--ls-sans)', fontSize:13, padding:'14px 4px', background:'transparent', border:'none', color:'var(--ls-ink)', outline:'none', fontWeight:300 }} />
                <button type="submit" style={{ fontFamily:'var(--ls-sans)', fontSize:11, letterSpacing:'0.24em', textTransform:'uppercase', color:'var(--ls-ink)', background:'transparent', border:'none', padding:'14px 0', cursor:'pointer', fontWeight:400 }}>Subscribe →</button>
              </form>
            )}
          </div>
        </section>
      );
    }

    /* ── Footer — warm beige, not dark ─── */

      const cols = [
        { title:'Shop', links:[['All Pieces','#'],['Silk Scarves','#'],['Gift Sets','#'],['Petite Scarves','#']] },
        { title:'Help', links:[['FAQ','Lumiere Silk FAQ.html'],['Shipping','#'],['Returns','#'],['Care Guide','#']] },
        { title:'House', links:[['About','Lumiere Silk About.html'],['Contact','Lumiere Silk Contact.html'],['Journal','#']] },
      ];
      return (
        <footer style={{ background:'var(--ls-beige)', color:'var(--ls-ink)', paddingTop:88 }}>
          <div style={container}>
            <div style={{ display:'grid', gridTemplateColumns:'1.6fr 1fr 1fr 1fr', gap:48, marginBottom:64 }}>

                <div style={{ fontFamily:'var(--ls-serif)', fontSize:30, letterSpacing:'0.12em', marginBottom:16 }}>LUMIÈRE SILK</div>

                  {[
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>,
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.24 2.65 7.86 6.39 9.29-.09-.78-.17-1.98.04-2.83.18-.77 1.23-5.22 1.23-5.22s-.31-.63-.31-1.56c0-1.46.85-2.55 1.9-2.55.9 0 1.33.67 1.33 1.48 0 .9-.58 2.26-.87 3.52-.25 1.05.52 1.9 1.54 1.9 1.85 0 3.1-2.38 3.1-5.2 0-2.15-1.46-3.66-3.54-3.66-2.41 0-3.83 1.81-3.83 3.68 0 .73.28 1.51.63 1.94.07.08.08.16.06.24l-.23.97c-.04.16-.13.19-.29.11-1.08-.5-1.76-2.1-1.76-3.38 0-2.74 1.99-5.25 5.74-5.25 3.01 0 5.35 2.15 5.35 5.01 0 2.99-1.88 5.39-4.49 5.39-.88 0-1.7-.46-1.98-1l-.54 2.01c-.19.75-.72 1.69-1.08 2.26.81.25 1.67.39 2.56.39 5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>,
                  ].map((ic,i)=>(
                    <a key={i} href="#" style={{ width:34, height:34, border:'1px solid rgba(61,52,42,0.25)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--ls-ink)' }}>{ic}</a>
                  ))}
                </div>
              </div>
              {cols.map(col => (
                <div key={col.title}>
                  <p style={{ fontFamily:'var(--ls-sans)', fontSize:10, letterSpacing:'0.32em', textTransform:'uppercase', marginBottom:22, fontWeight:500, color:'var(--ls-ink)' }}>{col.title}</p>
                  <div style={{ display:'flex', flexDirection:'column', gap:13 }}>
                    {col.links.map(([label,href]) => <a key={label} href={href} style={{ fontFamily:'var(--ls-sans)', fontSize:13, color:'var(--ls-ink)', opacity:0.7, fontWeight:300 }}>{label}</a>)}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ borderTop:'1px solid rgba(61,52,42,0.2)', padding:'24px 0', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'var(--ls-ink)', opacity:0.6 }}>© 2026 Lumière Silk · Designed in Canada</p>
              <p style={{ fontFamily:'var(--ls-sans)', fontSize:11, color:'var(--ls-ink)', opacity:0.6, letterSpacing:'0.08em' }}>lumieresilk.ca@gmail.com</p>
            </div>
          </div>
        </footer>
      );
    }

    /* ── App ─── */
    function App() {
      return (
        <div>
          <Announcement />
          <Header />
          <main>
            <Hero />
            <Mantra />
            <TextureSection />
            <FeaturedPieces />
            <LifestyleMoment />
            <ValueLayer />
            <TheGiftSection />
            <DetailTriptych />
            <Philosophy />
            <Newsletter />
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
